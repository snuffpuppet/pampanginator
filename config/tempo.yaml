server:
  http_listen_port: 3200
  log_level: info

# Disable the Kafka-based write path introduced in Tempo 2.7.
# Without this explicit flag, Tempo 2.10 activates the Kafka ingestion path
# by default and fails to start unless a Kafka topic is also configured.
# This stack uses direct OTLP gRPC ingestion — no Kafka required.
ingest:
  enabled: false

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"   # receives spans from otel-collector

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
