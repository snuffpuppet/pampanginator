version: "3.9"

# Isolated local dev for the app service only.
# Brings up app + app-postgres. MCP services are not started — the app starts
# without them; vocabulary/grammar calls will fail until those services are running.
# Start them independently: cd ../mcp-vocabulary && make up (port 8001)
#                            cd ../mcp-grammar && make up (port 8002)
#
# Usage (from app/):
#   docker compose up              # API + postgres
#   docker compose --profile frontend up   # + Vite dev server on :5173
#   make up
#   make up-frontend

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - VOCABULARY_SERVICE_URL=${VOCABULARY_SERVICE_URL:-http://mcp-vocabulary:8001}
      - GRAMMAR_SERVICE_URL=${GRAMMAR_SERVICE_URL:-http://mcp-grammar:8002}
      - DATABASE_URL=postgresql://kapampangan:${POSTGRES_PASSWORD:-kapampangan_dev}@app-postgres:5432/kapampangan
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - OTEL_SERVICE_NAME=kapampangan-app
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
    volumes:
      - .:/app
      - ./config:/app/config
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - default
      - pampanginator
    depends_on:
      app-postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - API_PROXY_TARGET=http://app:8000
    depends_on:
      - app

  app-postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=kapampangan
      - POSTGRES_USER=kapampangan
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kapampangan_dev}
    volumes:
      - app-postgres-dev-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kapampangan -d kapampangan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-postgres-dev-data:
  frontend-node-modules:

networks:
  pampanginator:
    external: true
