version: "3.9"

# Isolated local dev for the app service only.
# Brings up app + app-postgres. vocab and grammar are not started — override
# VOCABULARY_SERVICE_URL and GRAMMAR_SERVICE_URL if those services are needed.
#
# Usage (from repo root):
#   docker compose -f app/docker-compose.dev.yml up
#
# Or with live frontend dev server on :5173:
#   docker compose -f app/docker-compose.dev.yml --profile frontend up

services:

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - VOCABULARY_SERVICE_URL=${VOCABULARY_SERVICE_URL:-http://host.docker.internal:8001}
      - GRAMMAR_SERVICE_URL=${GRAMMAR_SERVICE_URL:-http://host.docker.internal:8002}
      - DATABASE_URL=postgresql://kapampangan:${POSTGRES_PASSWORD:-kapampangan_dev}@app-postgres:5432/kapampangan
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      - OTEL_SERVICE_NAME=kapampangan-app
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
    volumes:
      - ./app:/app
      - ./app/config:/app/config
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      app-postgres:
        condition: service_healthy

  frontend-dev:
    image: node:20-alpine
    profiles: ["frontend"]
    working_dir: /app
    volumes:
      - ./app/frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL_A=${OPENROUTER_MODEL_A:-anthropic/claude-sonnet-4-6}
      - OPENROUTER_MODEL_B=${OPENROUTER_MODEL_B:-meta-llama/llama-3.1-8b-instruct}
    depends_on:
      - app

  app-postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=kapampangan
      - POSTGRES_USER=kapampangan
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kapampangan_dev}
    volumes:
      - app-postgres-dev-data:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kapampangan -d kapampangan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-postgres-dev-data:
  frontend-node-modules:
