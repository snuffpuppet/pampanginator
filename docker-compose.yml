version: "3.9"

services:

  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VOCABULARY_SERVICE_URL=http://mcp-vocabulary:8001
      - GRAMMAR_SERVICE_URL=http://mcp-grammar:8002
    volumes:
      - ./config:/app/config        # Mount so prompt/tools changes take effect on restart
    depends_on:
      - mcp-vocabulary
      - mcp-grammar

  mcp-vocabulary:
    build: ./mcp-vocabulary
    ports:
      - "8001:8001"
    volumes:
      - ./mcp-vocabulary/data:/app/data   # Mount so vocabulary.json can be updated without rebuild

  mcp-grammar:
    build: ./mcp-grammar
    ports:
      - "8002:8002"
    volumes:
      - ./mcp-grammar/data:/app/data      # Mount so grammar_graph.json can be updated without rebuild
