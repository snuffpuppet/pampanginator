# Observability stack for the full dev environment.
# Sub-project services are started independently via their own docker-compose.yml
# files — 'make up' at the repo root delegates to each sub-project Makefile and
# then starts this file. Each sub-project can also be started standalone.
#
# Compatible with Docker Compose v2.19+.
#
# Usage:
#   make up              # full dev stack (all services + observability)
#   make up-app          # app service only  (delegates to app/Makefile)
#   make up-vocab        # vocab service only
#   make up-grammar      # grammar service only

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./app/config/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4318:4318"   # OTLP HTTP receiver — services send spans here
      - "8888:8888"   # Collector self-metrics (optional)
    networks:
      - default
      - pampanginator
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.10.3
    command:
      - "-config.file=/etc/tempo.yaml"
      - "-target=scalable-single-binary"   # avoids Kafka-based write path default in 2.7+
      - "-querier.frontend-address=127.0.0.1:9095"  # querier connects to frontend on same process
    volumes:
      - ./app/config/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API — Grafana reads traces here

  prometheus:
    image: prom/prometheus@sha256:759ea6db49103737f2a6f420b0d1632062d8ad99dec086c76db605fd0bf23e15
    command:
      - --config.file=/etc/prometheus.yaml
      - --enable-feature=exemplar-storage        # required for exemplars
      - --web.enable-remote-write-receiver       # required for Tempo metrics generator
    volumes:
      - ./app/config/prometheus.yaml:/etc/prometheus.yaml
    ports:
      - "9090:9090"   # Prometheus UI

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki.yaml"]
    volumes:
      - ./app/config/loki.yaml:/etc/loki.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki query API

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail.yaml"]
    volumes:
      - ./app/config/promtail.yaml:/etc/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read container logs via Docker socket
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"   # Grafana UI — http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./app/config/dashboard/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./app/config/dashboard/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./app/config/dashboard:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      - tempo
      - prometheus
      - loki

  grafana-init:
    image: curlimages/curl:8.19.0
    restart: "no"
    depends_on:
      grafana:
        condition: service_healthy
    volumes:
      - ./app/config/grafana-init.sh:/grafana-init.sh
    entrypoint: ["/bin/sh", "/grafana-init.sh"]

volumes:
  tempo-data:
  loki-data:
  grafana-data:

networks:
  pampanginator:
    external: true

