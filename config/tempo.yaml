server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:                    # receives from otel-collector

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
