tools:

  - name: vocabulary_lookup
    description: >
      Look up a Kapampangan word or phrase in the authoritative kaikki.org / Wiktionary
      vocabulary index. Returns definition, part of speech, IPA pronunciation, aspect
      forms, example sentences, and etymology where available.
    endpoint: http://mcp-vocabulary:8001/lookup
    method: POST
    timeout_seconds: 10
    parameters:
      - name: term
        type: string
        required: true
        description: "The Kapampangan or English word/phrase to look up"
      - name: type
        type: string
        required: false
        description: "word | phrase | verb | noun | adjective"
      - name: limit
        type: integer
        required: false
        description: "Maximum number of entries to return (default 6, max 20)"

  - name: grammar_lookup
    description: >
      Query the Kapampangan grammar knowledge graph. Use this for any grammar question:
      verb aspects and conjugation, verb focus types (actor/object/goal/locative/circumstantial),
      pronouns (absolutive and ergative sets), case markers, demonstratives, particles,
      negation, ligature, and existential constructions. Pass a verb root (e.g. 'mangan'),
      a grammar concept id (e.g. 'actor_focus', 'particles', 'demonstratives',
      'absolutive_pronouns', 'case_system'), or any grammar term the learner mentions.
    endpoint: http://mcp-grammar:8002/traverse
    method: POST
    timeout_seconds: 10
    parameters:
      - name: root
        type: string
        required: true
        description: "Verb root or grammar concept node id (e.g. 'mangan', 'actor_focus', 'particles', 'demonstratives')"
      - name: relationship
        type: string
        required: false
        description: "aspect_of | focus_type | related_form | derived_noun | all"
