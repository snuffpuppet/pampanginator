version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - BACKEND=${BACKEND:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - VOCABULARY_SERVICE_URL=http://mcp-vocabulary:8001
      - GRAMMAR_SERVICE_URL=http://mcp-grammar:8002
      - DATABASE_URL=postgresql://kapampangan:${POSTGRES_PASSWORD}@postgres:5432/kapampangan
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kapampangan-app
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
    volumes:
      - ./config:/app/config        # Mount so prompt/tools changes take effect on restart
    depends_on:
      - mcp-vocabulary
      - mcp-grammar
      - postgres
      - otel-collector

  mcp-vocabulary:
    build: ./mcp-vocabulary
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://kapampangan:${POSTGRES_PASSWORD}@postgres:5432/kapampangan
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kapampangan-mcp-vocabulary
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
      - RESEED_ON_STARTUP=${RESEED_ON_STARTUP:-false}
    volumes:
      - ./data:/app/data:ro        # canonical knowledge base — read-only for MCP servers
    depends_on:
      - postgres
      - otel-collector

  mcp-grammar:
    build: ./mcp-grammar
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://kapampangan:${POSTGRES_PASSWORD}@postgres:5432/kapampangan
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kapampangan-mcp-grammar
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
      - RESEED_ON_STARTUP=${RESEED_ON_STARTUP:-false}
    volumes:
      - ./data:/app/data:ro        # canonical knowledge base — read-only for MCP servers
    depends_on:
      - postgres
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4318:4318"   # OTLP HTTP receiver — services send spans here
      - "8888:8888"   # Collector self-metrics (optional)
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.10.3
    command:
      - "-config.file=/etc/tempo.yaml"
      - "-target=scalable-single-binary"   # avoids Kafka-based write path default in 2.7+
      - "-querier.frontend-address=127.0.0.1:9095"  # querier connects to frontend on same process
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API — Grafana reads traces here

  prometheus:
    image: prom/prometheus@sha256:759ea6db49103737f2a6f420b0d1632062d8ad99dec086c76db605fd0bf23e15
    command:
      - --config.file=/etc/prometheus.yaml
      - --enable-feature=exemplar-storage        # required for exemplars
      - --web.enable-remote-write-receiver       # required for Tempo metrics generator
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus.yaml
    ports:
      - "9090:9090"   # Prometheus UI

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki.yaml"]
    volumes:
      - ./config/loki.yaml:/etc/loki.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki query API (optional — useful for curl debugging)

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail.yaml"]
    volumes:
      - ./config/promtail.yaml:/etc/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read container logs via Docker socket
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"   # Grafana UI — http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./config/dashboard/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./config/dashboard/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/dashboard:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana   # persists DB so home dashboard pref survives restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      - tempo
      - prometheus
      - loki

  grafana-init:
    image: curlimages/curl:8.19.0
    restart: "no"
    depends_on:
      grafana:
        condition: service_healthy
    volumes:
      - ./config/grafana-init.sh:/grafana-init.sh
    entrypoint: ["/bin/sh", "/grafana-init.sh"]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=kapampangan
      - POSTGRES_USER=kapampangan
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kapampangan -d kapampangan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tempo-data:
  loki-data:
  grafana-data:
  postgres-data:
