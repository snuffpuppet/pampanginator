version: "3.9"

# Isolated local dev for the mcp-grammar service only.
# Brings up mcp-grammar + grammar-postgres. No other services are started.
#
# Usage (from mcp-grammar/):
#   docker compose up
#   make up

services:

  mcp-grammar:
    build: .
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://kapampangan:${POSTGRES_PASSWORD:-kapampangan_dev}@grammar-postgres:5432/kapampangan
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      - OTEL_SERVICE_NAME=kapampangan-mcp-grammar
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
      - RESEED_ON_STARTUP=${RESEED_ON_STARTUP:-false}
    volumes:
      - .:/app
      - ./data:/app/data:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    depends_on:
      grammar-postgres:
        condition: service_healthy

  grammar-postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=kapampangan
      - POSTGRES_USER=kapampangan
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kapampangan_dev}
    volumes:
      - grammar-postgres-dev-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kapampangan -d kapampangan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  grammar-postgres-dev-data:
