tools:

  - name: vocabulary_lookup
    description: >
      Look up a Kapampangan word or English concept in the kaikki.org / Wiktionary
      vocabulary index. Use this when the learner asks what a word means, how to say
      something in Kapampangan, or asks about a specific word's pronunciation,
      definition, or usage. Returns definition, part of speech, IPA pronunciation,
      aspect forms, example sentences, and etymology where available.
      Pass the Kapampangan word directly (e.g. 'mangan') or an English concept
      (e.g. 'eat', 'write'). Do NOT use this for grammar rules, verb conjugation
      patterns, or sentence structure — use grammar_lookup for those.
    endpoint: http://mcp-vocabulary:8001/lookup
    method: POST
    timeout_seconds: 10
    parameters:
      - name: term
        type: string
        required: true
        description: "The Kapampangan word or English word/concept to look up (e.g. 'mangan', 'eat', 'write')"
      - name: type
        type: string
        required: false
        description: "word | phrase | verb | noun | adjective"
      - name: limit
        type: integer
        required: false
        description: "Maximum number of entries to return (default 6, max 20)"

  - name: grammar_lookup
    description: >
      Query the Kapampangan grammar knowledge graph for grammatical rules and
      structures. Use this ONLY for grammatical concepts — verb aspect forms
      (progressive/completed/contemplated), verb focus types
      (actor/object/goal/locative/circumstantial), pronouns, case markers,
      particles, demonstratives, and word order rules.
      Do NOT call this for individual words or vocabulary — use vocabulary_lookup instead.
      Valid root values are Kapampangan verb roots (e.g. 'mangan', 'sulat', 'basa')
      or grammar concept IDs: actor_focus, object_focus, goal_focus, locative_focus,
      circumstantial_focus, progressive_aspect, completed_aspect, contemplated_aspect,
      case_system, absolutive_case, ergative_case, oblique_case,
      absolutive_pronouns, ergative_pronouns, portmanteau_pronouns,
      particles, demonstratives, vso_word_order, verb_focus_system.
    endpoint: http://mcp-grammar:8002/traverse
    method: POST
    timeout_seconds: 10
    parameters:
      - name: root
        type: string
        required: true
        description: "A Kapampangan verb root (e.g. 'mangan') or a grammar concept ID from the list above"
      - name: relationship
        type: string
        required: false
        description: "aspect_of | focus_type | related_form | derived_noun | all"
