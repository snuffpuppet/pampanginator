version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VOCABULARY_SERVICE_URL=http://mcp-vocabulary:8001
      - GRAMMAR_SERVICE_URL=http://mcp-grammar:8002
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kapampangan-app
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
    volumes:
      - ./config:/app/config        # Mount so prompt/tools changes take effect on restart
    depends_on:
      - mcp-vocabulary
      - mcp-grammar
      - otel-collector

  mcp-vocabulary:
    build: ./mcp-vocabulary
    ports:
      - "8001:8001"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kapampangan-mcp-vocabulary
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
    volumes:
      - ./mcp-vocabulary/data:/app/data   # Mount so vocabulary.json can be updated without rebuild
    depends_on:
      - otel-collector

  mcp-grammar:
    build: ./mcp-grammar
    ports:
      - "8002:8002"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kapampangan-mcp-grammar
      - OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=health
      - ENVIRONMENT=development
      - SERVICE_VERSION=0.1.0
    volumes:
      - ./mcp-grammar/data:/app/data      # Mount so grammar_graph.json can be updated without rebuild
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4318:4318"   # OTLP HTTP receiver — services send spans here
      - "8888:8888"   # Collector self-metrics (optional)
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API — Grafana reads traces here

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus.yaml
      - --enable-feature=exemplar-storage   # required for exemplars
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus.yaml
    ports:
      - "9090:9090"   # Prometheus UI

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"   # Grafana UI — http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./config/dashboard/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./config/dashboard/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/dashboard:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana   # persists DB so home dashboard pref survives restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      - tempo
      - prometheus

  grafana-init:
    image: curlimages/curl:latest
    restart: "no"
    depends_on:
      grafana:
        condition: service_healthy
    volumes:
      - ./config/grafana-init.sh:/grafana-init.sh
    entrypoint: ["/bin/sh", "/grafana-init.sh"]

volumes:
  tempo-data:
  grafana-data:
