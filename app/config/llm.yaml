# LLM backend configuration.
#
# active_backend is overridden at runtime by the BACKEND env var.
# model is overridden by the OPENROUTER_MODEL env var.
#
# tools_enabled: whether to pass tool definitions to the LLM and run the
# agentic dispatch loop. Set to false for models that do not support
# function calling.

active_backend: openrouter

backends:

  openrouter:
    api_type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    model: anthropic/claude-sonnet-4-6        # overridden by OPENROUTER_MODEL env var
    model_b: meta-llama/llama-3.1-8b-instruct # comparison model for /api/chat/model-b
    max_tokens: 1024
    tools_enabled: true
