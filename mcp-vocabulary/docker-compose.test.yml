version: "3.9"

# Standalone test runner for the mcp-vocabulary service.
# Tests are self-contained (all services mocked) — no DB or network needed.
#
# Usage (from mcp-vocabulary/):
#   docker compose -f docker-compose.test.yml run --rm test-mcp-vocabulary
#   make test

services:
  test-mcp-vocabulary:
    build:
      context: ..
      dockerfile: mcp-vocabulary/Dockerfile.test
    volumes:
      - .:/app  # live source — no rebuild needed after code changes
