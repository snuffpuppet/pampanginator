global:
  scrape_interval: 15s

scrape_configs:
  - job_name: kapampangan-app
    static_configs:
      - targets: ['app:8000']
    metrics_path: /metrics

  - job_name: kapampangan-mcp-vocabulary
    static_configs:
      - targets: ['mcp-vocabulary:8001']
    metrics_path: /metrics

  - job_name: kapampangan-grammar
    static_configs:
      - targets: ['grammar:8002']
    metrics_path: /metrics
