version: "3.9"

# Dev mode overrides — merged automatically when you run `docker compose up`.
# For prod, run: docker compose -f docker-compose.yml up

services:

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app/frontend:/app
      - frontend-node-modules:/app/node_modules   # named volume prevents host override
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL_A=${OPENROUTER_MODEL_A:-anthropic/claude-sonnet-4-6}
      - OPENROUTER_MODEL_B=${OPENROUTER_MODEL_B:-meta-llama/llama-3.1-8b-instruct}
    depends_on:
      - app

  app:
    volumes:
      - ./app:/app
      - ./app/config:/app/config   # more specific path wins — config stays mounted
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  vocab:
    volumes:
      - ./vocab:/app
      - ./vocab/data:/app/data:ro   # canonical knowledge base
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  grammar:
    volumes:
      - ./grammar:/app
      - ./grammar/data:/app/data:ro   # canonical knowledge base
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  frontend-node-modules:
